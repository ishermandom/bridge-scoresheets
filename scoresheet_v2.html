<style>
  /* === Variables === */
  :root {
    /* TODO: Consider mediumturquoise as the background color. */
    --background-color: #d7d7d7;
    --width: 8in;
    --height: 8.5in;
    /* Hard margin: physical printer limit (non-printable area). */
    --hard-margin: 0.18in;
    /* Soft margins: printable but obscured by the card holder. */
    --top-margin: 1in;
    --side-margin: 0.25in;
  }
  
  /* === Media queries === */
  @media screen {
    /* This matches real-world dimensions on my laptop. */
    body {
      zoom: 1.39;
    }
  }
  
  /* Rotate 90º so the 8.5in side is aligned with the 8.5in paper dimension,
     for fewer cuts needed. */
  @media print {
    .hard-margin, .soft-margin {
      display: none;
    }
    
    body {
      transform: rotate(90deg) translate(-0.25in, -0.25in);
      border-left: 0;
      border-right: 1pt dashed black;
    }
    /* For a 2-sided print: swap the active body rule above with this one,
       then print again on the reverse side of the page. */
    /*body {
      transform: rotate(-90deg) translate(0.25in, 0.25in);
      border-right: 0;
      border-left: 1pt dashed black;
    }*/
  }

  /* === Base === */
  body {
    width: var(--width);
    height: var(--height);
    margin: 0;
    /* Note: The padding is not quite aligned with the top margin because it's
     * ok for some text to be inside the holder, as long as the writing surface
     * is outside. */
    padding: 0.75in var(--side-margin);
    font-family: Verdana;
    box-sizing: border-box;
    position: relative; /* for the margin divs to position against */
  }
  
  body, table {
    font-size: 85%;
  }

  table {
    border-collapse: collapse;
  }

  td, th {
    border: 1px solid black;
    padding: 3px;
  }
  
  th {
    font-weight: bold;
    text-align: center;
    font-size: 70%;
  }
  
  /* === Main scoring table === */
  .dealer, .spacer, .vulnerability {
    line-height: 1;
  }
  .dealer {
    font-weight: bold;
    font-size: 4.5pt;
  }
  .vulnerability {
    color: #222;
    font-size: 4.5pt;
  }
  .spacer {
    display: inline-block;
    height: 1px;
  }
  
  thead tr {
    background-color: var(--background-color);
    box-shadow: inset 0 -1px 0 black;
  }
  #main tr:nth-child(even) {
    /* Lightness 98 works for the default gray; use 95 with mediumturquoise. */
    background-color: hsl(from var(--background-color) h s 98);
  }
  
  #main tr:nth-child(8n):not(:last-child) {
    border-bottom: 2px solid black;
  }
  
  #main td:nth-child(1) {
    text-align: center;
  }
  #main td:nth-child(2) {
    font-weight: bold;
    text-align: right;
    font-size: 7.5pt;
  }
  /* Column widths */
  #main td:nth-child(1) { width: 0.2in; }
  #main td:nth-child(3) { width: 0.3in; }
  #main td:nth-child(4) { width: 0.3in; }
  #main td:nth-child(5) { width: 0.2in; }
  #main td:nth-child(6) { width: 0.3in; }
  #main td:nth-child(7) { width: 0.6in; }
  #main td:nth-child(8) { width: 4.95in; }
  
  /* === Top matter === */
  #topmatter {
    position: absolute;
    top: var(--hard-margin);
    left: var(--side-margin);
    right: var(--side-margin);
    display: grid;
    grid-template-columns: max-content max-content;
    column-gap: 6px;
    row-gap: 4px;
    align-items: center;
    justify-content: center;
  }
  #topmatter label {
    font-weight: bold;
    font-size: 6pt;
    letter-spacing: 0.2px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* === Pair line & fields === */
  #pairline {
    padding-top: 1em;
    display: grid;
    grid-template-columns: 1.5fr 3fr 1.2fr;
    column-gap: 10px;
  }
  .field {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    font-size: 6.5pt;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.2px;
    white-space: nowrap;
    color: #333;
    line-height: 1;
  }
  .field::after {
    content: '';
    flex: 1;
    height: 9pt;
    border-bottom: 0.5pt solid #444;
  }

  /* === Charts === */
  .chart {
    display: contents;
  }
  .chart table {
    border: 1px solid #aaa;
    width: 100%;
  }
  .chart td {
    text-align: right;
    padding: 1.5pt 2.5pt;
    line-height: 1;
    border: none;
    font-size: 6.5pt;
    color: #111;
  }
  .chart td:nth-child(odd) {
    background: #f2f2f2;
  }
  .chart td:nth-child(even) {
    background: #d4d4d4;
    font-weight: bold;
  }
  .chart td:nth-child(even):not(:last-child) {
    border-right: 2px solid white;
  }
  #imps tr:first-child td {
    border-bottom: 1px solid white;
  }
  
  /* === License footer === */
  #license-footer {
    position: absolute;
    bottom: var(--hard-margin);
    left: var(--side-margin);
    right: var(--side-margin);
    text-align: center;
    font-size: 6pt;
    color: #888;
  }

  /* === Hard-margin overlays (non-printable area) === */
  .hard-margin {
    z-index: 3;
    position: absolute;
    background-color: black;
  }
  #hard-top, #hard-bottom {
    left: 0;
    width: var(--width);
  }
  #hard-top { height: var(--hard-margin); }
  #hard-bottom { height: var(--hard-margin); }
  /* Both sides use --hard-margin: whichever side is not the cut line is at
     the physical paper edge and requires the full printer margin. */
  #hard-left, #hard-right {
    top: 0;
    width: var(--hard-margin);
    height: var(--height);
  }
  #hard-top { top: 0; }
  #hard-bottom { bottom: 0; }
  #hard-left { left: 0; }
  #hard-right { right: 0; }

  /* === Soft-margin overlays (printable but inaccessible for writing) === */
  .soft-margin {
    z-index: 2;
    position: absolute;
    background-color: red;
    opacity: 50%;
  }
  #soft-top, #soft-bottom {
    left: 0;
    width: var(--width);
    height: var(--top-margin);
  }
  #soft-left, #soft-right {
    top: var(--top-margin);
    width: var(--side-margin);
    height: calc(var(--height) - 2 * var(--top-margin));
  }
  #soft-top { top: 0; }
  #soft-bottom { bottom: 0; }
  #soft-left { left: 0; }
  #soft-right { right: 0; }
</style>

<!-- Hard margins: non-printable area -->
<div class="hard-margin" id="hard-left"></div>
<div class="hard-margin" id="hard-top"></div>
<div class="hard-margin" id="hard-right"></div>
<div class="hard-margin" id="hard-bottom"></div>

<!-- Soft margins: printable but inaccessible for writing (obscured by card holder) -->
<div class="soft-margin" id="soft-left"></div>
<div class="soft-margin" id="soft-top"></div>
<div class="soft-margin" id="soft-right"></div>
<div class="soft-margin" id="soft-bottom"></div>

<table id="main">
  <thead>
    <tr>
      <th>Dlr Vul</th>
      <th>Bd</th>
      <th>Score</th>
      <th>MPs</th>
      <th>Vs</th>
      <th>Lead</th>
      <th>Contract</th>
      <th>Auction + Notes</th>
    </tr>
  </thead>
  <tbody>
  </tbody>
</table>

<div id="pairline">
  <span class="field">Pair / Team #</span>
  <span class="field">Event</span>
  <span class="field">Date</span>
</div>

<div id="topmatter">
  <div class="chart">
    <label>pts → IMPs</label>
    <table id="imps"></table>
  </div>

  <div class="chart">
    <label>IMPs → VPs</label>
    <table id="vps"></table>
  </div>
</div>

<div id="license-footer">© 2026 Ilya Sherman · CC BY-NC 4.0 · Non-commercial use only</div>

<script>
  /**
   * Populates the main scoring table with 32 rows.
   * For a team game, that's 4 rounds × 6 to 8 boards each.
   */
  function buildMainTable() {
    const DEALERS = ['N', 'E', 'S', 'W'];
    const VULNERABILITIES = ['NONE', 'N-S', 'E-W', 'BOTH'];

    const table = document.getElementsByTagName('tbody')[0];
    for (let i = 0; i < 32; i++) {
      const row = document.createElement('tr');

      // Populate the dealer and vulnerability.
      const dealerAndVulnerability = document.createElement('td');
      const dealer = DEALERS[i % 4];
      const vulnerability = VULNERABILITIES[(Math.trunc(i / 4) + i) % 4];
      dealerAndVulnerability.innerHTML =
          `<span class="dealer">${dealer}</span><br/>` +
          `<span class="spacer"></span><br/>` +
          `<span class="vulnerability">${vulnerability}</span>`;
      row.appendChild(dealerAndVulnerability);

      // Populate the board number.
      const board = document.createElement('td');
      board.textContent = i + 1;
      row.appendChild(board);

      for (let j = 2; j < 8; j++) {
        row.appendChild(document.createElement('td'));
      }
      table.appendChild(row);
    }
  }
  
  /** Builds the IMP conversion chart (raw score → IMP). */
  function buildImpTable() {
    const THRESHOLDS = [
      20, 50, 90, 130, 170, 220, 270, 320, 370, 430, 500, 600, 750, 900,
      1100, 1300, 1500, 1750, 2000, 2250, 2500, 3000, 3500, 4000
    ];
    const table = document.getElementById('imps');
    const firstRow = table.insertRow();
    const secondRow = table.insertRow();
    for (const [index, threshold] of THRESHOLDS.entries()) {
      // Alternate rows, so that similar-width raw scores end up aligned.
      const row = index % 2 === 0 ? firstRow : secondRow;

      const score = document.createElement('td');
      score.textContent = `${threshold}+`;
      row.appendChild(score);

      const imps = document.createElement('td');
      imps.textContent = index + 1;
      row.appendChild(imps);
    }
  }
  
  /** Builds the VP conversion chart (IMP margin → VP split out of 20). */
  function buildVpTable() {
    const THRESHOLDS = [
      0, 1, 3, 5, 8, 11, 14, 17, 20, 24, 28
    ];
    const table = document.getElementById('vps');
    const row = table.insertRow();
    for (const [index, threshold] of THRESHOLDS.entries()) {
      const imps = document.createElement('td');
      imps.textContent = threshold === 0 ? '0' : `${threshold}+`;
      row.appendChild(imps);

      const win = index + 10;
      const vps = document.createElement('td');
      vps.textContent = `${win}-${20 - win}`;
      row.appendChild(vps);
    }
  }
  
  buildMainTable();
  buildImpTable();
  buildVpTable();
</script>
